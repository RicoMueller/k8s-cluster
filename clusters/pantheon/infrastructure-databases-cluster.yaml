apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-databases-cluster
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infrastructure-databases
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers/databases/pantheon-pg
  prune: true
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-age
