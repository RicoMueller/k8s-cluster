apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-backup-nfs
spec:
  capacity:
    storage: 100Gi
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions: [nfsvers=4, hard]
  nfs:
    server: 192.168.178.42
    path: /paperless-backup
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-backup
  namespace: paperless
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: paperless-backup-nfs
  resources:
    requests:
      storage: 100Gi
