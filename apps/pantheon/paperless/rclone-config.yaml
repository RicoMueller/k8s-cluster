apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-rclone-config
  namespace: paperless
data:
  rclone.conf: |
    [storagebox]
    type = sftp
    host = u620152.your-storagebox.de
    user = u620152-sub1
    port = 23
    key_file = /keys/id_ed25519_hetzner
    shell_type = unix
    # Host-Key vorab hinterlegt: verhindert den Config-Rückschreibversuch
    # (scheitert am read-only ConfigMap-Mount) und schützt vor MITM.
    known_hosts_file = /config/known_hosts
  known_hosts: |
    u620152.your-storagebox.de ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIICf9svRenC/PLKIL9nk6K/pxQgoiFC41wTNvoIncOxs
    [u620152.your-storagebox.de]:23 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIICf9svRenC/PLKIL9nk6K/pxQgoiFC41wTNvoIncOxs
