apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      securityContext:
        fsGroup: 1000
      enableServiceLinks: false  
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: pantheon.local/memory
                    operator: In
                    values: ["16gi"]
      containers:
        - name: paperless
          # renovate: datasource=docker depName=ghcr.io/paperless-ngx/paperless-ngx
          # MIGRATION: zunächst exakt die Quellversion. Anhebung in Schritt B.16.
          image: ghcr.io/paperless-ngx/paperless-ngx:2.17.1
          ports:
            - containerPort: 8000
          env:
            - name: PAPERLESS_DBENGINE
              value: postgresql
            - name: PAPERLESS_DBHOST
              value: pantheon-pg-rw.databases.svc.cluster.local
            - name: PAPERLESS_DBPORT
              value: "5432"
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_DBUSER
              value: paperless
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-secret
                  key: db-password
            - name: PAPERLESS_REDIS
              value: redis://paperless-redis:6379
            - name: PAPERLESS_PORT
              value: "8000"
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secret
                  key: secret-key
            - name: PAPERLESS_TIME_ZONE
              value: Europe/Berlin
            - name: PAPERLESS_OCR_LANGUAGE
              value: deu+eng
            - name: PAPERLESS_TASK_WORKERS
              value: "2"
            - name: PAPERLESS_THREADS_PER_WORKER
              value: "2"
            - name: PAPERLESS_WEBSERVER_WORKERS
              value: "3"
            - name: PAPERLESS_OCR_SKIP_ARCHIVE_FILE
              value: with_text
            - name: PAPERLESS_SCRATCH_DIR
              value: /scratch
            - name: PAPERLESS_URL
              value: https://paperless.rm-it.org
            - name: PAPERLESS_ALLOWED_HOSTS
              value: paperless.rm-it.org,paperless.pantheon.local
            - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
              value: https://paperless.rm-it.org,http://paperless.pantheon.local
            - name: PAPERLESS_PROXY_SSL_HEADER
              value: '["HTTP_X_FORWARDED_PROTO","https"]'
            - name: PAPERLESS_CONSUMER_POLLING
              value: "30"
            - name: PAPERLESS_CONSUMER_RECURSIVE
              value: "true"
            - name: PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume
            - name: scratch
              mountPath: /scratch
            # MIGRATION: temporärer Import-Mount — in B.16 wieder entfernen.
            - name: migration
              mountPath: /tmp/import
              readOnly: true
          startupProbe:
            httpGet:
              path: /accounts/login/
              port: 8000
              # Kubelet fragt mit der Pod-IP im Host-Header an -> Django lehnt
              # das wegen ALLOWED_HOSTS ab (DisallowedHost -> HTTP 400 -> Probe
              # scheitert -> Dauerneustart). Erlaubten Hostnamen mitschicken.
              httpHeaders:
                - name: Host
                  value: paperless.pantheon.local
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /accounts/login/
              port: 8000
              httpHeaders:
                - name: Host
                  value: paperless.pantheon.local
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume
        - name: scratch
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        # MIGRATION: temporäres Import-Volume — in B.16 wieder entfernen.
        - name: migration
          persistentVolumeClaim:
            claimName: paperless-migration
