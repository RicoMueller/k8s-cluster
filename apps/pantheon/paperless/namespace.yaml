apiVersion: v1
kind: Namespace
metadata:
  name: paperless
  labels:
    # Das Paperless-ngx-Image startet seinen Entrypoint (s6-overlay) als root
    # und dropt erst dann auf UID 1000. 'restricted' würde das verhindern
    # -> 'baseline' (bewusster Trade-off).
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
